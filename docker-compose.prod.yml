version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vertexdev-postgres
    environment:
      POSTGRES_DB: vertexdev_chat
      POSTGRES_USER: vertexdev_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertexdev_user -d vertexdev_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vertexdev-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_this_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: vertexdev-server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://vertexdev_user:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/vertexdev_chat
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_this_password}
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_secure_random_string}
      - CLIENT_URL=${CLIENT_URL:-https://yourdomain.com}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@yourdomain.com}
      - RESEND_FROM_NAME=${RESEND_FROM_NAME:-VertexDev Chat}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      - SOCKET_CORS_ORIGIN=${CLIENT_URL:-https://yourdomain.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build: ./client
    container_name: vertexdev-client
    ports:
      - "80:80"
    environment:
      - VITE_SOCKET_URL=${VITE_SOCKET_URL:-wss://yourdomain.com}
      - VITE_API_URL=${VITE_API_URL:-https://yourdomain.com/api}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
